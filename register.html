<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - FilipinoBlog</title>
    <link rel="shortcut icon" type="x-icon" href="logo.png" />
    <link rel="stylesheet" href="bootstrap.min.css" />
    <link rel="stylesheet" href="register.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img
            src="logo.png"
            alt="FilipinoBlog Logo"
            width="30"
            height="30"
            class="d-inline-block align-top"
          />
          <span class="text-filipino">FilipinoBlog</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Discover</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="login.html"
                >Log in</a
              >
            </li>
            <li class="nav-item">
              <button id="themeToggle" class="btn btn-link nav-link">
                <i class="bi bi-sun-fill"></i>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-lg">
            <div class="card-body p-5">
              <h2 class="text-center mb-4">Join FilipinoBlog</h2>
              <form id="registerForm">
                <div class="mb-3">
                  <label for="fullName" class="form-label">Full Name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="fullName"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="confirmPassword" class="form-label"
                    >Confirm Password</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    required
                  />
                </div>
                <div class="mb-3 form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="agreeTerms"
                    required
                  />
                  <label class="form-check-label" for="agreeTerms"
                    >I agree to the
                    <a href="#" class="text-filipino">Terms of Service</a> and
                    <a href="#" class="text-filipino">Privacy Policy</a></label
                  >
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn login">
                    Create Account
                  </button>
                </div>
              </form>
              <div
                id="errorMessage"
                class="alert alert-danger mt-3"
                style="display: none"
              ></div>
              <p class="text-center mt-3">
                Already have an account?
                <a href="login.html" class="text-filipino">Log in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="mt-5 py-4">
      <div class="container text-center">
        <p>&copy; 2024 FilipinoBlog. All rights reserved.</p>
        <ul class="list-inline">
          <li class="list-inline-item">
            <a href="#" class="text-muted">Terms of Service</a>
          </li>
          <li class="list-inline-item">
            <a href="#" class="text-muted">Privacy</a>
          </li>
          <li class="list-inline-item">
            <a href="#" class="text-muted">Contact</a>
          </li>
        </ul>
      </div>
    </footer>

    <script src="bootstrap.bundle.min.js"></script>
    <script>
      const themeToggle = document.getElementById("themeToggle");
      const htmlElement = document.documentElement;
      const iconElement = themeToggle.querySelector("i");

      function setTheme(theme) {
        htmlElement.setAttribute("data-bs-theme", theme);
        if (theme === "dark") {
          iconElement.classList.replace("bi-sun-fill", "bi-moon-fill");
        } else {
          iconElement.classList.replace("bi-moon-fill", "bi-sun-fill");
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("theme") || "light";
        setTheme(savedTheme);
      });

      themeToggle.addEventListener("click", () => {
        let currentTheme = htmlElement.getAttribute("data-bs-theme");
        let newTheme = currentTheme === "light" ? "dark" : "light";
        setTheme(newTheme);

        localStorage.setItem("theme", newTheme);
      });

      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const fullName = document.getElementById("fullName").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;
          const agreeTerms = document.getElementById("agreeTerms").checked;
          const errorMessage = document.getElementById("errorMessage");

          if (password !== confirmPassword) {
            errorMessage.textContent = "Passwords do not match";
            errorMessage.style.display = "block";
            return;
          }

          if (!agreeTerms) {
            errorMessage.textContent =
              "You must agree to the Terms of Service and Privacy Policy";
            errorMessage.style.display = "block";
            return;
          }

          try {
            const response = await fetch("/api/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ fullName, email, password }),
            });

            if (response.ok) {
              window.location.href = "/dashboard";
            } else {
              const data = await response.json();
              errorMessage.textContent = data.message || "Registration failed";
              errorMessage.style.display = "block";
            }
          } catch (err) {
            errorMessage.textContent = "An error occurred. Please try again.";
            errorMessage.style.display = "block";
          }
        });
    </script>
  </body>
</html>
